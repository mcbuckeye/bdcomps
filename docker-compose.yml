services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-4174}:80"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://bdcomps:bdcomps@postgres:5432/bdcomps
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-900}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-30000}
      OPENAI_RETRIES: ${OPENAI_RETRIES:-4}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-high}
      OPENAI_SEARCH_CONTEXT_SIZE: ${OPENAI_SEARCH_CONTEXT_SIZE:-high}
      OPENAI_SEARCH_TOKEN_BUDGET: ${OPENAI_SEARCH_TOKEN_BUDGET:-unlimited}
      OPENAI_DISABLE_PROXY: ${OPENAI_DISABLE_PROXY:-1}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read(1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bdcomps
      POSTGRES_USER: bdcomps
      POSTGRES_PASSWORD: bdcomps
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bdcomps -d bdcomps"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
