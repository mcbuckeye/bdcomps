services:
  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.bdcomps-web.rule=Host(`bdcomps.pchomelab.com`)
      - traefik.http.routers.bdcomps-web.entrypoints=web
      - traefik.http.routers.bdcomps-web.priority=1
      - traefik.http.services.bdcomps-web.loadbalancer.server.port=80
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-bdcomps}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-bdcomps}
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY is required}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.5}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-900}
      OPENAI_MAX_OUTPUT_TOKENS: ${OPENAI_MAX_OUTPUT_TOKENS:-30000}
      OPENAI_RETRIES: ${OPENAI_RETRIES:-4}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-high}
      OPENAI_SEARCH_CONTEXT_SIZE: ${OPENAI_SEARCH_CONTEXT_SIZE:-high}
      OPENAI_SEARCH_TOKEN_BUDGET: ${OPENAI_SEARCH_TOKEN_BUDGET:-unlimited}
      OPENAI_DISABLE_PROXY: ${OPENAI_DISABLE_PROXY:-1}
      COOKIE_SECURE: ${COOKIE_SECURE:-1}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read(1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bdcomps}
      POSTGRES_USER: ${POSTGRES_USER:-bdcomps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - bdcomps_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bdcomps} -d ${POSTGRES_DB:-bdcomps}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bdcomps_postgres_data:

networks:
  dokploy-network:
    external: true
